<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .container {
            width: 350px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>

    <script>
        function validateForm() {

            let name = document.getElementById("name").value;
            let roll = document.getElementById("roll").value;
            let mobile = document.getElementById("mobile").value;
            let email = document.getElementById("email").value;

            let namePattern = /^[A-Za-z ]+$/;
            let rollPattern = /^[0-9]+$/;
            let mobilePattern = /^[0-9]{10}$/;

            // Name validation
            if (name == "" || !namePattern.test(name)) {
                alert("Enter valid name (only characters)");
                return false;
            }

            // Roll number validation
            if (roll == "" || !rollPattern.test(roll)) {
                alert("Roll number must contain only digits");
                return false;
            }

            // Mobile validation
            if (!mobilePattern.test(mobile)) {
                alert("Mobile number must be 10 digits");
                return false;
            }

            // Email validation
            if (!(email.includes("@") && email.includes("."))) {
                alert("Enter valid email");
                return false;
            }

            alert("Form submitted successfully!");
            return true;
        }
    </script>

</head>

<body>

<div class="container">
    <h2>Student Form</h2>

    <form onsubmit="return validateForm()">

        <label>Name:</label>
        <input type="text" id="name">

        <label>Roll No:</label>
        <input type="text" id="roll">

        <label>Mobile No:</label>
        <input type="text" id="mobile">

        <label>Email:</label>
        <input type="text" id="email">

        <button type="submit">Submit</button>

 
    </form>
</div>

</body>

    <script>
        function showCode(id, btnElement) {
            // Hide all sections
            document.querySelectorAll('.code-section').forEach(el => {
                el.classList.remove('active');
            });
            // Show target section
            document.getElementById(id).classList.add('active');
            
            // Update active state on sidebar buttons
            document.querySelectorAll('.menu-btn').forEach(el => {
                el.classList.remove('active');
            });
            btnElement.classList.add('active');
        }

        function copyText(elementId, btnElement) {
            const copyText = document.getElementById(elementId);
            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            
            navigator.clipboard.writeText(copyText.value).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = "COPIED!";
                btnElement.classList.add("copied");
                
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.classList.remove("copied");
                }, 2000);
            }).catch(err => {
                alert('Failed to copy text: ', err);
            });
        }
    </script>
</body>
